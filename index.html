<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ANIFORUM - 动漫交友论坛</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #FF6B9D;
      --secondary: #7C5CFF;
      --accent: #00D4AA;
      --bg: #0F0F1A;
      --surface: #1A1A2E;
      --surface-light: #252540;
      --text-primary: #FFFFFF;
      --text-secondary: #A0A0B8;
      --danger: #FF4757;
      --radius: 16px;
      --radius-sm: 8px;
      --radius-full: 9999px;
    }

    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: var(--surface);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--surface-light);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--secondary);
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes sparkle {
      0%, 100% { opacity: 0; transform: scale(0); }
      50% { opacity: 1; transform: scale(1); }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(100%); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .fade-in { animation: fadeIn 0.3s ease forwards; }
    .slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

    /* Navbar */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 64px;
      background: rgba(15, 15, 26, 0.9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 1000;
      display: flex;
      align-items: center;
      padding: 0 24px;
    }

    .navbar-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: var(--text-primary);
    }

    .navbar-logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Comic Neue', cursive;
      font-weight: 700;
      font-size: 20px;
    }

    .navbar-title {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .navbar-search {
      flex: 1;
      max-width: 400px;
      margin: 0 32px;
      position: relative;
    }

    .navbar-search input {
      width: 100%;
      height: 40px;
      background: var(--surface);
      border: 1px solid transparent;
      border-radius: var(--radius-full);
      padding: 0 16px 0 44px;
      color: var(--text-primary);
      font-size: 14px;
      transition: all 0.2s;
    }

    .navbar-search input:focus {
      outline: none;
      border-color: var(--primary);
      background: var(--surface-light);
    }

    .navbar-search svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
    }

    .navbar-actions {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-left: auto;
    }

    .navbar-btn {
      position: relative;
      width: 40px;
      height: 40px;
      background: var(--surface);
      border: none;
      border-radius: 50%;
      color: var(--text-primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .navbar-btn:hover {
      background: var(--surface-light);
      transform: scale(1.05);
    }

    .navbar-btn .badge {
      position: absolute;
      top: -2px;
      right: -2px;
      min-width: 18px;
      height: 18px;
      background: var(--danger);
      border-radius: var(--radius-full);
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 5px;
    }

    .user-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      cursor: pointer;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
      transition: transform 0.2s;
    }

    .user-avatar:hover {
      transform: scale(1.1);
    }

    .user-dropdown {
      position: relative;
    }

    .dropdown-menu {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      min-width: 180px;
      background: var(--surface);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: var(--radius);
      padding: 8px;
      display: none;
      animation: slideDown 0.2s ease;
    }

    .dropdown-menu.show {
      display: block;
    }

    .dropdown-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      color: var(--text-primary);
      text-decoration: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background 0.2s;
      border: none;
      background: none;
      width: 100%;
      font-size: 14px;
    }

    .dropdown-item:hover {
      background: var(--surface-light);
    }

    .dropdown-item.danger {
      color: var(--danger);
    }

    /* Main Layout */
    .main-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 88px 24px 24px;
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 24px;
    }

    .main-content {
      min-width: 0;
    }

    /* Sidebar */
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .sidebar-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 20px;
      animation: fadeIn 0.3s ease;
    }

    .sidebar-card-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .hot-topics {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .topic-tag {
      padding: 6px 12px;
      background: var(--surface-light);
      border-radius: var(--radius-full);
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }

    .topic-tag:hover {
      background: var(--secondary);
      color: var(--text-primary);
    }

    .online-users {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .online-user {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
    }

    .online-user-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      position: relative;
    }

    .online-user-avatar::after {
      content: '';
      position: absolute;
      bottom: 0;
      right: 0;
      width: 10px;
      height: 10px;
      background: var(--accent);
      border: 2px solid var(--surface);
      border-radius: 50%;
    }

    .online-user-info {
      flex: 1;
      min-width: 0;
    }

    .online-user-name {
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .online-user-status {
      font-size: 12px;
      color: var(--text-secondary);
    }

    /* Post Card */
    .post-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
      animation: fadeIn 0.3s ease;
      transition: all 0.2s;
    }

    .post-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .post-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .post-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 18px;
      cursor: pointer;
      text-decoration: none;
      color: var(--text-primary);
    }

    .post-user-info {
      flex: 1;
    }

    .post-username {
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      color: var(--text-primary);
    }

    .post-username:hover {
      color: var(--primary);
    }

    .post-time {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .post-content {
      font-size: 14px;
      line-height: 1.7;
      margin-bottom: 12px;
      white-space: pre-wrap;
    }

    .post-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .post-tag {
      padding: 4px 10px;
      background: rgba(124, 92, 255, 0.2);
      color: var(--secondary);
      border-radius: var(--radius-full);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .post-tag:hover {
      background: var(--secondary);
      color: var(--text-primary);
    }

    .post-images {
      display: grid;
      gap: 4px;
      margin-bottom: 12px;
      border-radius: var(--radius-sm);
      overflow: hidden;
    }

    .post-images.single {
      grid-template-columns: 1fr;
    }

    .post-images.grid-2 {
      grid-template-columns: repeat(2, 1fr);
    }

    .post-images.grid-3 {
      grid-template-columns: repeat(3, 1fr);
    }

    .post-image {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .post-image:hover {
      transform: scale(1.02);
    }

    .post-actions {
      display: flex;
      gap: 24px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    .post-action {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-secondary);
      font-size: 14px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      transition: all 0.2s;
    }

    .post-action:hover {
      background: var(--surface-light);
      color: var(--text-primary);
    }

    .post-action.liked {
      color: var(--primary);
    }

    .post-action.liked svg {
      fill: var(--primary);
    }

    /* Create Post */
    .create-post {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
      display: flex;
      gap: 12px;
    }

    .create-post textarea {
      flex: 1;
      background: var(--surface-light);
      border: none;
      border-radius: var(--radius-sm);
      padding: 12px;
      color: var(--text-primary);
      font-size: 14px;
      resize: none;
      min-height: 60px;
      font-family: inherit;
    }

    .create-post textarea:focus {
      outline: none;
    }

    .create-post textarea::placeholder {
      color: var(--text-secondary);
    }

    .create-post-actions {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: flex-end;
    }

    /* Buttons */
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: var(--radius-full);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }

    .btn:active {
      transform: scale(0.95);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), #FF8FB1);
      color: white;
    }

    .btn-primary:hover {
      filter: brightness(1.1);
      box-shadow: 0 4px 20px rgba(255, 107, 157, 0.4);
    }

    .btn-secondary {
      background: transparent;
      border: 2px solid var(--secondary);
      color: var(--secondary);
    }

    .btn-secondary:hover {
      background: var(--secondary);
      color: white;
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
    }

    .btn-ghost:hover {
      color: var(--text-primary);
      background: var(--surface-light);
    }

    .btn-sm {
      padding: 6px 14px;
      font-size: 13px;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      padding: 24px;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal {
      background: var(--surface);
      border-radius: var(--radius);
      width: 100%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
      animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .modal-header {
      padding: 20px 24px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-title {
      font-size: 18px;
      font-weight: 700;
    }

    .modal-close {
      width: 32px;
      height: 32px;
      background: var(--surface-light);
      border: none;
      border-radius: 50%;
      color: var(--text-primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .modal-close:hover {
      background: var(--danger);
    }

    .modal-body {
      padding: 24px;
    }

    .modal-footer {
      padding: 16px 24px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }

    /* Form */
    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 8px;
      color: var(--text-secondary);
    }

    .form-input {
      width: 100%;
      height: 44px;
      background: var(--surface-light);
      border: 2px solid transparent;
      border-radius: var(--radius-sm);
      padding: 0 16px;
      color: var(--text-primary);
      font-size: 14px;
      transition: all 0.2s;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .form-input.error {
      border-color: var(--danger);
    }

    .form-error {
      font-size: 12px;
      color: var(--danger);
      margin-top: 6px;
    }

    .form-textarea {
      width: 100%;
      min-height: 120px;
      background: var(--surface-light);
      border: 2px solid transparent;
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      color: var(--text-primary);
      font-size: 14px;
      resize: vertical;
      font-family: inherit;
    }

    .form-textarea:focus {
      outline: none;
      border-color: var(--primary);
    }

    /* Tags Select */
    .tags-select {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag-option {
      padding: 8px 14px;
      background: var(--surface-light);
      border: 2px solid transparent;
      border-radius: var(--radius-full);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tag-option:hover {
      border-color: var(--secondary);
    }

    .tag-option.selected {
      background: var(--secondary);
      color: white;
    }

    /* Avatar Select */
    .avatar-select {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
    }

    .avatar-option {
      aspect-ratio: 1;
      border-radius: 50%;
      cursor: pointer;
      border: 3px solid transparent;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 700;
    }

    .avatar-option:hover {
      transform: scale(1.1);
    }

    .avatar-option.selected {
      border-color: var(--primary);
      box-shadow: 0 0 20px rgba(255, 107, 157, 0.4);
    }

    /* Profile Page */
    .profile-header {
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 24px;
    }

    .profile-cover {
      height: 180px;
      background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
      position: relative;
    }

    .profile-info {
      padding: 0 24px 24px;
      position: relative;
    }

    .profile-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      position: absolute;
      top: -50px;
      left: 24px;
      border: 4px solid var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: 700;
    }

    .profile-actions {
      display: flex;
      justify-content: flex-end;
      padding-top: 16px;
      gap: 12px;
    }

    .profile-details {
      margin-top: 60px;
    }

    .profile-name {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .profile-username {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }

    .profile-bio {
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .profile-stats {
      display: flex;
      gap: 32px;
      margin-bottom: 16px;
    }

    .profile-stat {
      text-align: center;
      cursor: pointer;
    }

    .profile-stat-value {
      font-size: 20px;
      font-weight: 700;
    }

    .profile-stat-label {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .profile-favorites {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .profile-favorite-tag {
      padding: 6px 12px;
      background: rgba(124, 92, 255, 0.2);
      color: var(--secondary);
      border-radius: var(--radius-full);
      font-size: 13px;
    }

    /* Forum */
    .forum-categories {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .forum-category {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 20px;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      color: inherit;
    }

    .forum-category:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .forum-category-icon {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin-bottom: 12px;
    }

    .forum-category-name {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .forum-category-desc {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .forum-category-count {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 12px;
    }

    /* Thread List */
    .thread-list {
      background: var(--surface);
      border-radius: var(--radius);
    }

    .thread-item {
      padding: 16px 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      gap: 16px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .thread-item:last-child {
      border-bottom: none;
    }

    .thread-item:hover {
      background: var(--surface-light);
    }

    .thread-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
      flex-shrink: 0;
    }

    .thread-content {
      flex: 1;
      min-width: 0;
    }

    .thread-title {
      font-weight: 600;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .thread-badge {
      padding: 2px 8px;
      border-radius: var(--radius-full);
      font-size: 11px;
      font-weight: 600;
    }

    .thread-badge.top {
      background: var(--danger);
      color: white;
    }

    .thread-badge.good {
      background: var(--accent);
      color: white;
    }

    .thread-meta {
      font-size: 12px;
      color: var(--text-secondary);
      display: flex;
      gap: 16px;
    }

      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 18px;
      flex-shrink: 0;

      flex: 1;
      min-width: 0;
    }

    .message-thread-name {
      font-weight: 600;
      margin-bottom: 4px;
    }

      color: var(--text-secondary);

      overflow: hidden;
      text-overflow: ellipsis;

      align-items: center;
      gap: 12px;

      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

      max-width: 70%;
      animation: fadeIn 0.2s ease;

    .chat-message.received {

      line-height: 1.5;

    }

    .chat-message.received .chat-message-content {
      background: var(--surface-light);
      border-bottom-left-radius: 4px;
    }

    .chat-message-time {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    .chat-message.sent .chat-message-time {
      text-align: right;
    }

      padding: 16px 20px;

      display: flex;
      gap: 12px;

      height: 44px;
      background: var(--surface-light);
      border: none;
      border-radius: var(--radius-full);
      padding: 0 20px;
      color: var(--text-primary);
      font-size: 14px;

      display: flex;
      align-items: center;
      justify-content: center;

    .image-modal {

      align-items: center;
      justify-content: center;

        store.users = data.users || SAMPLE_USERS;

        store.messages = data.messages || SAMPLE_MESSAGES;
        store.currentUser = data.currentUser || null;
      } else {
        store.users = [...SAMPLE_USERS];
        store.posts = [...SAMPLE_POSTS];
        store.messages = [...SAMPLE_MESSAGES];
      }
    }

    // Save to localStorage
    function saveStore() {
      localStorage.setItem('aniforum_data', JSON.stringify({
        users: store.users,
        posts: store.posts,
        messages: store.messages,
        currentUser: store.currentUser
      }));
    }

    // ==================== Utilities ====================
    function generateId() {
      return 'id_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
    }

    function formatTime(timestamp) {
      const diff = Date.now() - timestamp;
      if (diff < 60000) return '刚刚';
      if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
      if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
      if (diff < 604800000) return Math.floor(diff / 86400000) + '天前';
      return new Date(timestamp).toLocaleDateString('zh-CN');
    }

    function getAvatarStyle(avatarIndex) {
      const colors = AVATAR_COLORS[avatarIndex % AVATAR_COLORS.length];
      return `background: linear-gradient(135deg, ${colors[0]}, ${colors[1]})`;
    }

    function getUser(userId) {
      return store.users.find(u => u.id === userId);
    }

    function isLoggedIn() {
      return store.currentUser !== null;
    }

    function getUnreadCount() {
      if (!store.currentUser) return 0;
      return store.messages.filter(m => m.toId === store.currentUser.id && !m.read).length;
    }

    function getUserMessages(userId) {
      return store.messages.filter(m => 
        (m.fromId === userId && m.toId === store.currentUser?.id) ||
        (m.fromId === store.currentUser?.id && m.toId === userId)
      ).sort((a, b) => a.createdAt - b.createdAt);
    }

    function getConversations() {
      if (!store.currentUser) return [];
      const userIds = new Set();
      store.messages.forEach(m => {
        if (m.fromId === store.currentUser.id) userIds.add(m.toId);
        if (m.toId === store.currentUser.id) userIds.add(m.fromId);
      });
      return Array.from(userIds).map(id => {
        const user = getUser(id);
        const messages = getUserMessages(id);
        const lastMsg = messages[messages.length - 1];
        const unread = messages.filter(m => m.fromId === id && !m.read).length;
        return { user, lastMsg, unread };
      }).filter(c => c.user).sort((a, b) => (b.lastMsg?.createdAt || 0) - (a.lastMsg?.createdAt || 0));
    }

    // ==================== Routing ====================
    function getRoute() {
      const hash = window.location.hash || '#/';
      const [path, ...params] = hash.slice(2).split('/');
      return { path: path || '', params };
    }

    function navigate(path) {
      window.location.hash = '#/' + path;
    }

      if (store.currentUser) {
        navAvatarIcon.textContent = AVATARS[store.currentUser.avatar];
        const count = getUnreadCount();
        if (count > 0) {
          messageBadge.textContent = count;
          messageBadge.classList.remove('hidden');

        userDropdown.style.display = 'block';

      } else {

        mobileNav.classList.add('hidden');
        messageBadge.classList.add('hidden');
      }
    }

              ${conversations.length > 0 ? conversations.map(conv => `
                <div class="message-thread ${store.activeThread === conv.user.id ? 'active' : ''}" data-action="open-thread" data-user-id="${conv.user.id}">
                  <div class="message-thread-avatar" style="${getAvatarStyle(conv.user.avatar)}">${AVATARS[conv.user.avatar]}</div>
                  <div class="message-thread-info">
                    <div class="message-thread-name">${conv.user.nickname}</div>
                    <div class="message-thread-preview">${conv.lastMsg?.content || ''}</div>
                  </div>
                  <div class="message-thread-meta">
                    <div class="message-thread-time">${conv.lastMsg ? formatTime(conv.lastMsg.createdAt) : ''}</div>
                    ${conv.unread > 0 ? `<span class="message-thread-unread">${conv.unread}</span>` : ''}
                  </div>
                </div>
              `).join('') : `
                <div class="empty-state" style="padding: 40px 20px;">
                  <div class="empty-state-icon" style="font-size: 40px;">📭</div>
                  <p class="empty-state-desc">暂无消息</p>
                </div>
              `}
            </div>
            <div class="chat-area" id="chatArea">
              <div class="chat-empty">
                <p>选择一个会话开始聊天</p>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderChatArea(userId) {
      const user = getUser(userId);
      if (!user) return '';
      const messages = getUserMessages(userId);

      return `
        <div class="chat-area show-mobile" style="display: flex; flex-direction: column;">
          <div class="chat-header">
            <button class="btn btn-ghost btn-sm" id="backToListBtn" style="margin-right: 8px;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="m15 18-6-6 6-6"></path>
              </svg>
            </button>
            <div class="message-thread-avatar" style="${getAvatarStyle(user.avatar)}; width: 40px; height: 40px; font-size: 16px;">${AVATARS[user.avatar]}</div>
            <div>
              <div style="font-weight: 600;">${user.nickname}</div>
              <div style="font-size: 12px; color: var(--text-secondary);">@${user.username}</div>
            </div>
          </div>
          <div class="chat-messages" id="chatMessages">
            ${messages.map(m => {
              const isSent = m.fromId === store.currentUser.id;
              return `
                <div class="chat-message ${isSent ? 'sent' : 'received'}">
                  <div class="chat-message-content">${m.content}</div>
                  <div class="chat-message-time">${formatTime(m.createdAt)}</div>
                </div>
              `;
            }).join('')}
          </div>
          <div class="chat-input">
            <input type="text" placeholder="输入消息..." id="chatInput" data-user-id="${userId}">
            <button class="btn btn-primary" id="sendMessageBtn" data-user-id="${userId}">发送</button>
          </div>
        </div>
      `;
    }

    function renderSettingsPage() {
      if (!store.currentUser) {
        return `
          <div class="empty-state" style="grid-column: 1 / -1;">
            <div class="empty-state-icon">🔐</div>
            <h3 class="empty-state-title">请先登录</h3>
            <button class="btn btn-primary" id="loginPromptBtn2">去登录</button>
          </div>
        `;
      }

      return `
        <div class="main-content" style="grid-column: 1 / -1; max-width: 600px; margin: 0 auto;">
          <div class="page-header">
            <h1 class="page-title">设置</h1>
          </div>
          <div class="profile-header fade-in" style="padding: 24px;">
            <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 24px;">
              <div class="profile-avatar" style="${getAvatarStyle(store.currentUser.avatar)}; position: static; width: 80px; height: 80px; font-size: 32px; cursor: pointer;" id="settingsAvatar">${AVATARS[store.currentUser.avatar]}</div>
              <div>
                <h2 style="font-size: 20px; font-weight: 700;">${store.currentUser.nickname}</h2>
                <p style="color: var(--text-secondary);">@${store.currentUser.username}</p>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">昵称</label>
              <input type="text" class="form-input" id="settingsNickname" value="${store.currentUser.nickname}">
            </div>
            <div class="form-group">
              <label class="form-label">个人简介</label>
              <textarea class="form-textarea" id="settingsBio">${store.currentUser.bio || ''}</textarea>
            </div>
            <div class="form-group">
              <label class="form-label">喜欢的动漫 (当前: ${store.currentUser.favoriteAnimes.length}个)</label>
              <div class="tags-select" id="settingsTags">
                ${ANIME_TAGS.slice(0, 15).map(tag => `
                  <span class="tag-option ${store.currentUser.favoriteAnimes.includes(tag) ? 'selected' : ''}">${tag}</span>
                `).join('')}
              </div>
            </div>
            <button class="btn btn-primary" id="saveSettingsBtn">保存设置</button>
          </div>
        </div>
      `;
    }

    // ==================== Modals ====================
    function showModal(title, content, actions = []) {
      const modalContent = document.getElementById('modalContent');
      modalContent.innerHTML = `
        <div class="modal-header">
          <h2 class="modal-title">${title}</h2>
          <button class="modal-close" id="modalCloseBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
        <div class="modal-body">${content}</div>
        ${actions.length > 0 ? `
          <div class="modal-footer">
            ${actions.map(a => `<button class="btn ${a.class || 'btn-secondary'}" id="${a.id}">${a.text}</button>`).join('')}
          </div>
        ` : ''}
      `;
      document.getElementById('modalOverlay').classList.add('show');
      document.getElementById('modalCloseBtn').onclick = hideModal;
    }

    function hideModal() {
      document.getElementById('modalOverlay').classList.remove('show');
    }

    function showLoginModal() {
      showModal('登录 ANIFORUM', `
        <div class="form-group">
          <label class="form-label">用户名</label>
          <input type="text" class="form-input" id="loginUsername" placeholder="输入用户名">
        </div>
        <div class="form-group">
          <label class="form-label">密码</label>
          <input type="password" class="form-input" id="loginPassword" placeholder="输入密码">
        </div>
      `, [
        { id: 'loginSubmitBtn', text: '登录', class: 'btn-primary' },
        { id: 'loginToRegisterBtn', text: '没有账号？去注册', class: 'btn-ghost' }
      ]);

      document.getElementById('loginSubmitBtn').onclick = handleLogin;
      document.getElementById('loginToRegisterBtn').onclick = showRegisterModal;
    }

    function showRegisterModal() {
      showModal('注册 ANIFORUM', `
        <div class="form-group">
          <label class="form-label">用户名</label>
          <input type="text" class="form-input" id="registerUsername" placeholder="3-20位字母数字">
        </div>
        <div class="form-group">
          <label class="form-label">昵称</label>
          <input type="text" class="form-input" id="registerNickname" placeholder="你的显示名称">
        </div>
        <div class="form-group">
          <label class="form-label">密码</label>
          <input type="password" class="form-input" id="registerPassword" placeholder="至少6位">
        </div>
        <div class="form-group">
          <label class="form-label">喜欢的动漫 (至少选3个)</label>
          <div class="tags-select" id="registerTags">
            ${ANIME_TAGS.map(tag => `<span class="tag-option" data-tag="${tag}">${tag}</span>`).join('')}
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">选择头像</label>
          <div class="avatar-select" id="registerAvatars">
            ${AVATARS.map((a, i) => `
              <div class="avatar-option ${i === 0 ? 'selected' : ''}" data-avatar="${i}" style="${getAvatarStyle(i)}">${a}</div>
            `).join('')}
          </div>
        </div>
      `, [
        { id: 'registerSubmitBtn', text: '注册', class: 'btn-primary' },
        { id: 'registerToLoginBtn', text: '已有账号？去登录', class: 'btn-ghost' }
      ]);

      // Tag selection
      let selectedTags = new Set();
      document.querySelectorAll('#registerTags .tag-option').forEach(el => {
        el.onclick = () => {
          const tag = el.dataset.tag;
          if (selectedTags.has(tag)) {
            selectedTags.delete(tag);
            el.classList.remove('selected');
          } else {
            selectedTags.add(tag);
            el.classList.add('selected');
          }
        };
      });

      // Avatar selection
      let selectedAvatar = 0;
      document.querySelectorAll('#registerAvatars .avatar-option').forEach(el => {
        el.onclick = () => {
          document.querySelectorAll('#registerAvatars .avatar-option').forEach(e => e.classList.remove('selected'));
          el.classList.add('selected');
          selectedAvatar = parseInt(el.dataset.avatar);
        };
      });

      document.getElementById('registerSubmitBtn').onclick = () => handleRegister(selectedTags, selectedAvatar);
      document.getElementById('registerToLoginBtn').onclick = showLoginModal;
    }

    function handleLogin() {
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value;

      if (!username || !password) {
        alert('请填写完整信息');
        return;
      }

      const user = store.users.find(u => u.username === username);
      if (!user) {
        alert('用户不存在');
        return;
      }

      store.currentUser = user;
      saveStore();
      hideModal();
      render();
    }

    function handleRegister(selectedTags, selectedAvatar) {
      const username = document.getElementById('registerUsername').value.trim();
      const nickname = document.getElementById('registerNickname').value.trim();
      const password = document.getElementById('registerPassword').value;

      if (!username || !nickname || !password) {
        alert('请填写完整信息');
        return;
      }

      if (username.length < 3 || username.length > 20) {
        alert('用户名长度需在3-20位之间');
        return;
      }

      if (password.length < 6) {
        alert('密码长度至少6位');
        return;
      }

      if (selectedTags.size < 3) {
        alert('请至少选择3个喜欢的动漫');
        return;
      }

      if (store.users.find(u => u.username === username)) {
        alert('用户名已存在');
        return;
      }

      const newUser = {
        id: generateId(),
        username,
        nickname,
        avatar: selectedAvatar,
        bio: '',
        favoriteAnimes: Array.from(selectedTags),
        followers: [],
        following: [],
        createdAt: Date.now()
      };

      store.users.push(newUser);
      store.currentUser = newUser;
      saveStore();
      hideModal();
      render();
    }

    // ==================== Event Handlers ====================
    function handleCreatePost() {
      const content = document.getElementById('createPostContent').value.trim();
      const tagsInput = document.getElementById('createPostTags').value.trim();

      if (!content) {
        alert('请输入内容');
        return;
      }

      const tags = tagsInput ? tagsInput.split(/[,，]/).map(t => t.trim()).filter(t => t) : [];

      const newPost = {
        id: generateId(),
        userId: store.currentUser.id,
        content,
        images: [],
        tags,
        likes: [],
        comments: [],
        createdAt: Date.now()
      };

      store.posts.unshift(newPost);
      saveStore();

      document.getElementById('createPostContent').value = '';
      document.getElementById('createPostTags').value = '';

      render();
    }

    function handleLike(postId) {
      if (!store.currentUser) {
        showLoginModal();
        return;
      }

      const post = store.posts.find(p => p.id === postId);
      if (!post) return;

      const idx = post.likes.indexOf(store.currentUser.id);
      if (idx > -1) {
        post.likes.splice(idx, 1);
      } else {
        post.likes.push(store.currentUser.id);
      }

      saveStore();
      render();
    }

    function handleComment(postId) {
      const commentsEl = document.getElementById(`comments-${postId}`);
      if (commentsEl) {
        commentsEl.classList.toggle('hidden');
      }
    }

    function handleSubmitComment(postId) {
      const input = document.querySelector(`[data-comment-input="${postId}"]`) || document.getElementById('postCommentInput');
      if (!input) return;

      const content = input.value.trim();
      if (!content) return;

      if (!store.currentUser) {
        showLoginModal();
        return;
      }

      const post = store.posts.find(p => p.id === postId);
      if (!post) return;

      post.comments.push({
        id: generateId(),
        userId: store.currentUser.id,
        content,
        createdAt: Date.now()
      });

      saveStore();
      input.value = '';
      render();
    }

    function handleDeletePost(postId) {
      if (!confirm('确定要删除这条动态吗？')) return;

      const idx = store.posts.findIndex(p => p.id === postId);
      if (idx > -1) {
        store.posts.splice(idx, 1);
        saveStore();
        render();
      }
    }

    function handleFollow(userId) {
      if (!store.currentUser) {
        showLoginModal();
        return;
      }

      const targetUser = getUser(userId);
      if (!targetUser || userId === store.currentUser.id) return;

      const idx = store.currentUser.following.indexOf(userId);
      if (idx > -1) {
        store.currentUser.following.splice(idx, 1);
      } else {
        store.currentUser.following.push(userId);
      }

      // Update user data
      const userIdx = store.users.findIndex(u => u.id === store.currentUser.id);
      if (userIdx > -1) {
        store.users[userIdx] = { ...store.currentUser };
      }

      saveStore();
      render();
    }

    function handleSendMessage(userId) {
      const input = document.getElementById('chatInput');
      if (!input) return;

      const content = input.value.trim();
      if (!content) return;

      const message = {
        id: generateId(),
        fromId: store.currentUser.id,
        toId: userId,
        content,
        read: false,
        createdAt: Date.now()
      };

      store.messages.push(message);
      saveStore();

      input.value = '';
      store.activeThread = userId;

      // Update chat area
      const chatArea = document.getElementById('chatArea');
      if (chatArea) {
        chatArea.innerHTML = renderChatArea(userId);
        const chatMessages = document.getElementById('chatMessages');
        if (chatMessages) {
          chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        setupChatHandlers();
      }
    }

    function handleSaveSettings() {
      const nickname = document.getElementById('settingsNickname').value.trim();
      const bio = document.getElementById('settingsBio').value.trim();
      const selectedTags = new Set();
      document.querySelectorAll('#settingsTags .tag-option.selected').forEach(el => {
        selectedTags.add(el.textContent);
      });

      if (!nickname) {
        alert('昵称不能为空');
        return;
      }

      store.currentUser.nickname = nickname;
      store.currentUser.bio = bio;
      store.currentUser.favoriteAnimes = Array.from(selectedTags);

      const userIdx = store.users.findIndex(u => u.id === store.currentUser.id);
      if (userIdx > -1) {
        store.users[userIdx] = { ...store.currentUser };
      }

      saveStore();
      alert('设置已保存');
      render();
    }

    // ==================== Main Render ====================
    function render() {
      const { path, params } = getRoute();
      const app = document.getElementById('app');

      renderNavbar();

      switch (path) {
        case '':
        case 'home':
          app.innerHTML = renderHomePage();
          break;
        case 'profile':
          app.innerHTML = renderProfilePage(params[0]);
          break;
        case 'forum':
          if (params[0]) {
            app.innerHTML = renderCategoryPage(params[0]);
          } else {
            app.innerHTML = renderForumPage();
          }
          break;
        case 'post':
          app.innerHTML = renderPostPage(params[0]);
          break;
        case 'messages':
          app.innerHTML = renderMessagesPage();
          break;
        case 'settings':
          app.innerHTML = renderSettingsPage();
          break;
        default:
          app.innerHTML = renderHomePage();
      }

      setupEventListeners();
    }

    function setupEventListeners() {
      // User dropdown
      const userDropdown = document.getElementById('userDropdownMenu');

      document.getElementById('userAvatarBtn').onclick = (e) => {
        if (store.currentUser) {
          e.stopPropagation();
          userDropdown.classList.toggle('show');
        } else {
          showLoginModal();
        }
      };

      document.addEventListener('click', () => {
        userDropdown.classList.remove('show');
      });

      // Dropdown items
      document.getElementById('myProfileBtn').onclick = (e) => {
        e.preventDefault();
        if (store.currentUser) {
          navigate(`profile/${store.currentUser.id}`);
        }
      };

      document.getElementById('settingsBtn').onclick = (e) => {
        e.preventDefault();
        navigate('settings');
      };

      document.getElementById('logoutBtn').onclick = (e) => {
        e.preventDefault();
        store.currentUser = null;
        saveStore();
        navigate('');
        render();
      };

      // Create post
      const createPostBtn = document.getElementById('createPostBtn');
      if (createPostBtn) {
        createPostBtn.onclick = handleCreatePost;
      }

      // Messages button
      document.getElementById('messagesBtn').onclick = () => {
        navigate('messages');
      };

      // Login prompts
      const loginPromptBtn = document.getElementById('loginPromptBtn');
      if (loginPromptBtn) loginPromptBtn.onclick = showLoginModal;

      const loginPromptBtn2 = document.getElementById('loginPromptBtn2');
      if (loginPromptBtn2) loginPromptBtn2.onclick = showLoginModal;

      // Follow button
      const followBtn = document.getElementById('followBtn');
      if (followBtn) {
        followBtn.onclick = () => handleFollow(followBtn.dataset.userId);
      }

      // Message user button
      const messageUserBtn = document.getElementById('messageUserBtn');
      if (messageUserBtn) {
        messageUserBtn.onclick = () => {
          store.activeThread = messageUserBtn.dataset.userId;
          navigate('messages');
        };
      }

      // Settings
      const settingsAvatar = document.getElementById('settingsAvatar');
      if (settingsAvatar) {
        settingsAvatar.onclick = () => showModal('选择头像', `
          <div class="avatar-select">
            ${AVATARS.map((a, i) => `
              <div class="avatar-option ${i === store.currentUser.avatar ? 'selected' : ''}" data-avatar="${i}" style="${getAvatarStyle(i)}">${a}</div>
            `).join('')}
          </div>
        `, [{ id: 'closeAvatarModal', text: '关闭', class: 'btn-ghost' }]);

        document.getElementById('closeAvatarModal').onclick = () => {
          const selected = document.querySelector('.avatar-select .avatar-option.selected');
          if (selected) {
            store.currentUser.avatar = parseInt(selected.dataset.avatar);
            const userIdx = store.users.findIndex(u => u.id === store.currentUser.id);
            if (userIdx > -1) {
              store.users[userIdx].avatar = store.currentUser.avatar;
            }
            saveStore();
            render();
          }
          hideModal();
        };

        document.querySelectorAll('.avatar-select .avatar-option').forEach(el => {
          el.onclick = () => {
            document.querySelectorAll('.avatar-select .avatar-option').forEach(e => e.classList.remove('selected'));
            el.classList.add('selected');
          };
        });
      }

      // Settings tags
      document.querySelectorAll('#settingsTags .tag-option').forEach(el => {
        el.onclick = () => el.classList.toggle('selected');
      });

      // Save settings
      const saveSettingsBtn = document.getElementById('saveSettingsBtn');
      if (saveSettingsBtn) {
        saveSettingsBtn.onclick = handleSaveSettings;
      }

      // Edit profile
      const editProfileBtn = document.getElementById('editProfileBtn');
      if (editProfileBtn) {
        editProfileBtn.onclick = () => navigate('settings');
      }

      // Post actions (event delegation)
      document.querySelectorAll('[data-action]').forEach(el => {
        el.onclick = (e) => {
          const action = el.dataset.action;
          const postId = el.dataset.postId;
          const userId = el.dataset.userId;

          switch (action) {
            case 'like':
              handleLike(postId);
              break;
            case 'comment':
              handleComment(postId);
              break;
            case 'delete':
              handleDeletePost(postId);
              break;
            case 'submit-comment':
              handleSubmitComment(postId);
              break;
            case 'view-profile':
              navigate(`profile/${userId}`);
              break;
            case 'view-post':
              navigate(`post/${postId}`);
              break;
            case 'open-thread':
              store.activeThread = userId;
              const chatArea = document.getElementById('chatArea');
              if (chatArea) {
                chatArea.innerHTML = renderChatArea(userId);
                const chatMessages = document.getElementById('chatMessages');
                if (chatMessages) {
                  chatMessages.scrollTop = chatMessages.scrollHeight;
                }
                setupChatHandlers();
              }
              document.querySelectorAll('.message-thread').forEach(t => t.classList.remove('active'));
              el.classList.add('active');
              break;
          }
        };
      });

      // Enter key for comment input
      document.querySelectorAll('[data-comment-input]').forEach(el => {
        el.onkeypress = (e) => {
          if (e.key === 'Enter') {
            const postId = el.dataset.commentInput;
            handleSubmitComment(postId);
          }
        };
      });

      // Post page comment input
      const postCommentInput = document.getElementById('postCommentInput');
      if (postCommentInput) {
        postCommentInput.onkeypress = (e) => {
          if (e.key === 'Enter') {
            handleSubmitComment(postCommentInput.dataset.postId);
          }
        };
      }

      // Mobile profile button
      const mobileProfileBtn = document.getElementById('mobileProfileBtn');
      if (mobileProfileBtn) {
        mobileProfileBtn.onclick = (e) => {
          e.preventDefault();
          if (store.currentUser) {
            navigate(`profile/${store.currentUser.id}`);
          } else {
            showLoginModal();
          }
        };
      }

      // Mobile nav active state
      const currentPath = getRoute().path;
      document.querySelectorAll('.mobile-nav-item').forEach(item => {
        const page = item.dataset.page;
        if ((page === 'home' && (currentPath === '' || currentPath === 'home')) ||
            (page === 'forum' && currentPath === 'forum') ||
            (page === 'messages' && currentPath === 'messages')) {
          item.classList.add('active');
        } else {
          item.classList.remove('active');
        }
      });
    }

    function setupChatHandlers() {
      const sendMessageBtn = document.getElementById('sendMessageBtn');
      const chatInput = document.getElementById('chatInput');
      const backToListBtn = document.getElementById('backToListBtn');

      if (sendMessageBtn) {
        sendMessageBtn.onclick = () => handleSendMessage(sendMessageBtn.dataset.userId);
      }

      if (chatInput) {
        chatInput.onkeypress = (e) => {
          if (e.key === 'Enter') {
            handleSendMessage(chatInput.dataset.userId);
          }
        };
      }

      if (backToListBtn) {
        backToListBtn.onclick = () => {
          store.activeThread = null;
          render();
        };
      }
    }

    // Modal close
    document.getElementById('modalOverlay').onclick = (e) => {
      if (e.target.id === 'modalOverlay') {
        hideModal();
      }
    };

    // Image modal
    document.getElementById('imageModalClose').onclick = () => {
      document.getElementById('imageModal').classList.remove('show');
    };

    document.getElementById('imageModal').onclick = (e) => {
      if (e.target.id === 'imageModal') {
        document.getElementById('imageModal').classList.remove('show');
      }
    };

    // Search
    document.getElementById('searchInput').onkeypress = (e) => {
      if (e.key === 'Enter') {
        const query = e.target.value.trim().toLowerCase();
        if (query) {
          // Simple search - filter posts by content
          const results = store.posts.filter(p => 
            p.content.toLowerCase().includes(query) ||
            p.tags.some(t => t.toLowerCase().includes(query))
          );
          if (results.length > 0) {
            // Navigate to first result
            navigate(`post/${results[0].id}`);
          }
        }
      }
    };

    // Hash change
    window.addEventListener('hashchange', render);

    // Create sakura particles
    function createSakura() {
      const container = document.getElementById('sakuraContainer');
      for (let i = 0; i < 15; i++) {
        const sakura = document.createElement('div');
        sakura.className = 'sakura';
        sakura.style.left = Math.random() * 100 + '%';
        sakura.style.animationDelay = Math.random() * 6 + 's';
        sakura.style.animationDuration = (4 + Math.random() * 4) + 's';
        sakura.style.opacity = 0.3 + Math.random() * 0.3;
        sakura.style.transform = `rotate(${Math.random() * 360}deg)`;
        container.appendChild(sakura);
      }
    }

    // Initialize
    loadStore();
    createSakura();
    render();
  </script>
</body>
</html>
